site_name: PulseDB
site_description: An enterprise-grade, in-memory database with a native AI Vector Engine.
site_url: https://gkavinrajancodes.github.io/pulseDB/
repo_url: https://github.com/gkavinrajanCodes/pulseDB
repo_name: gkavinrajanCodes/pulseDB

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [sdk]

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Architecture: architecture.md
