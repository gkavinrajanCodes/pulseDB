name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio flake8 mypy httpx setuptools wheel langchain-core
        pip install -e sdk/
    - name: Lint with flake8
      run: |
        flake8 server/ sdk/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 server/ sdk/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Type check with mypy
      run: |
        mypy server/ sdk/ --ignore-missing-imports
    - name: Test with pytest
      run: |
        PYTHONPATH=$(pwd):$(pwd)/sdk NODE_ID=node1 CLUSTER_NODES=node1 pytest tests/ -v
